<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <section class="gallery-section">
        <div class="container">

            <div class="heading">
                <h2>Gallery</h2>
            </div>

            <div class="container__gallery">

                <div class="item item-1">
                    <img src="images/portfolio1.jpg" alt="Portfolio Item 1" />
                    <span class="number">1</span>
                </div>

                <div class="item item-2">
                    <img src="images/portfolio2.jpg" alt="Item 2" />
                    <span class="number">2</span>
                </div>

                <div class="item item-3">
                    <img src="images/portfolio3.jpg" alt="Item 3" />
                    <span class="number">3</span>
                </div>

                <div class="item item-4">
                    <img src="images/portfolio4.jpg" alt="Item 4" />
                    <span class="number">4</span>
                </div>

                <div class="item item-5">
                    <img src="images/portfolio5.jpg" alt="Item 5" />
                    <span class="number">5</span>
                </div>

                <div class="item item-6">
                    <img src="images/portfolio6.jpg" alt=" Item 6" />
                    <span class="number">6</span>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
